; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c5-devkitc1-n4]
platform = espressif32
board = esp32-c5-devkitc1-n4
framework = arduino
monitor_speed = 115200
; Switch from default.csv (1.25 MB per app slot) to min_spiffs.csv
; (1.875 MB per app slot) for headroom — the firmware is ~1.16 MB, which
; was already 85 % of default's slot. NVS stays at 0x9000 so saved
; Wi-Fi/MQTT/pulse settings survive the migration.
board_build.partitions = min_spiffs.csv
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    knolleary/PubSubClient @ ^2.8

; Convenience env for wireless updates once the device has joined Wi-Fi:
;   pio run -e esp32-c5-devkitc1-n4-ota -t upload
[env:esp32-c5-devkitc1-n4-ota]
extends = env:esp32-c5-devkitc1-n4
upload_protocol = espota
upload_port = flexit.local
